spring.application.name=RatingService

spring.datasource.name=RatingService
spring.datasource.username=postgres
spring.datasource.password=Nik@9905366469
spring.datasource.url=jdbc:postgresql://localhost:5432/RatingService
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate dialect (must be separate)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# keep validate in prod; for dev you can use "update"
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true

eureka.instance.prefer-ip-address=true

eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
server.port=8082