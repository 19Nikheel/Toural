spring:
  application:
    name: AuthServer
  datasource:
    name: AuthenticationServer
    username: postgres
    password: "Nik@9905366469"
    url: jdbc:postgresql://localhost:5432/AuthenticationServer
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka

server:
  port: 9000